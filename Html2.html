<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strong Spoon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#015A64">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Strong Spoon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cart-nav">
    <a href="cart.html" class="cart-icon">
      <span class="cart-emoji">🛒</span><span class="cart-count">0</span>
    </a>
  </div>

  <section class="flavours-page">
    <div class="premium-header">
      <div class="header-decoration"></div>
      <h1 class="premium-title">Our Flavours</h1>
      <p class="premium-subtitle">Handcrafted with love, packed with protein</p>
      <div id="dropStatusBanner" class="drop-status-banner" style="display:none; margin-top:14px;"></div>
      <div class="header-decoration" style="margin-top:18px;"></div>
    </div>

    <div class="flavour-grid" id="flavour-grid">
      <a href="Brown issues.html" class="flavour-card">
        <div class="flavour-icon">🍫</div>
        <h3 class="flavour-name">Brownie Issues</h3>
        <p class="flavour-desc">chocolate indulgence</p>
        <span class="flavour-tag">CHOCOLATE</span>
      </a>
      
      <a href="power-mix.html" class="flavour-card">
        <div class="flavour-icon">🥜</div>
        <h3 class="flavour-name">Power Mix</h3>
        <p class="flavour-desc">Nutty protein boost</p>
        <span class="flavour-tag">PEANUT BUTTER</span>
      </a>
      
      <a href="golden-scoop.html" class="flavour-card">
        <div class="flavour-icon">🍦</div>
        <h3 class="flavour-name">Golden Scoop</h3>
        <p class="flavour-desc">Classic smooth vanilla</p>
        <span class="flavour-tag">VANILLA</span>
      </a>
      
      <a href="spoon-crumble.html" class="flavour-card">
        <div class="flavour-icon">🍪</div>
        <h3 class="flavour-name">Spoon Crumble</h3>
        <p class="flavour-desc">Cookie crunch delight</p>
        <span class="flavour-tag">COOKIE</span>
      </a>
    </div>


    
    <!-- Featured Reviews -->
    <div class="reviews-section" id="reviewsSection" style="display:none;">
      <div class="reviews-header">
        <span class="reviews-stars-display" id="reviewsAvg"></span>
        <span class="reviews-count" id="reviewsCount"></span>
      </div>
      <div class="reviews-carousel" id="reviewsCarousel"></div>
    </div>

    <a href="feedback.html" class="feedback-nudge">⭐ Leave a Review</a>
    <a href="index.html" class="back-link">← Back to Home</a>
  </section>

  <script>
    const launchDate = new Date('2026-04-10T08:00:00-05:00').getTime();
    const now = new Date().getTime();
    if (new URLSearchParams(window.location.search).get('preview') === 'strongspoon') {
      localStorage.setItem('ss_preview', 'true');
    }
    if (now < launchDate && localStorage.getItem('ss_preview') !== 'true') {
      window.location.href = '/countdown.html';
    }

    // Live drop status banner
    fetch('/api/drop-status').then(function(r){ return r.json(); }).then(function(d) {
      var banner = document.getElementById('dropStatusBanner');
      if (!banner) return;
      var labels = {
        green:  '🟢 Accepting Orders Now',
        yellow: '⚡ Hurry Up! Limited Slots Left Today',
        red:    '🔴 STATUS: SOLD OUT'
      };
      banner.textContent = labels[d.status] || '';
      banner.className = 'drop-status-banner status-' + d.status;
      banner.style.display = 'inline-flex';
    }).catch(function(){});
  </script>

  <script src="products.js"></script>
  <script src="script.js"></script>
  <script>
    // Load featured reviews
    fetch('/api/feedback/featured').then(r => r.json()).then(reviews => {
      if (!reviews || !reviews.length) return;
      const section = document.getElementById('reviewsSection');
      const carousel = document.getElementById('reviewsCarousel');
      const avgEl = document.getElementById('reviewsAvg');
      const countEl = document.getElementById('reviewsCount');

      const avg = (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1);
      avgEl.textContent = '⭐'.repeat(Math.round(avg)) + ' ' + avg;
      countEl.textContent = reviews.length + ' review' + (reviews.length !== 1 ? 's' : '');

      reviews.slice(0, 6).forEach(r => {
        const card = document.createElement('div');
        card.className = 'review-card';
        const stars = '⭐'.repeat(r.rating);
        const name = r.name || 'Anonymous';
        const flavor = r.flavor ? `<span class="review-flavor">${r.flavor}</span>` : '';
        const comment = r.comment ? `<p class="review-comment">"${r.comment}"</p>` : '';
        card.innerHTML = `<div class="review-top"><span class="review-stars">${stars}</span>${flavor}</div>${comment}<div class="review-name">— ${name}</div>`;
        carousel.appendChild(card);
      });
      section.style.display = 'block';
    }).catch(() => {});
  </script>
</body>
</html>
