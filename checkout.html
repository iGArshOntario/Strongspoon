<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Strong Spoon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#009688">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/app-icon.png">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  
  <section class="checkout-container">
    <div class="checkout-header">
      <h1 class="checkout-title">CHECKOUT</h1>
      <a href="cart.html" class="btn-link">← Back to Cart</a>
    </div>

    <div class="checkout-content">
      <div class="checkout-left">
        <h2>Order Summary</h2>
        <div id="checkoutItems" class="checkout-items"></div>
        
        <div class="checkout-summary">
          <div class="summary-row total">
            <span><strong>Total:</strong></span>
            <span id="checkoutTotal"><strong>$0.00</strong></span>
          </div>
          <div id="taxIncluded" class="tax-included-note">
            Tax Included
          </div>
        </div>
      </div>

      <div class="checkout-right">
        <h2>Payment Information</h2>
        
        <form id="payment-form">
          <div class="form-group">
            <label for="customerName">Full Name *</label>
            <input type="text" id="customerName" name="customerName" required>
          </div>

          <div class="form-group">
            <label for="customerEmail">Email *</label>
            <input type="email" id="customerEmail" name="customerEmail" required>
          </div>

          <div class="form-group">
            <label for="customerPhone">Phone *</label>
            <input type="tel" id="customerPhone" name="customerPhone" required>
          </div>

          <div class="form-group">
            <label for="customerAddress">Delivery Address *</label>
            <textarea id="customerAddress" name="customerAddress" rows="2" required></textarea>
          </div>

          <div class="form-group">
            <label>Card Information</label>
            <div id="card-element"></div>
            <div id="card-errors" role="alert"></div>
          </div>

          <button type="submit" id="submit-payment" class="btn teal">
            <span id="button-text">Pay Now</span>
            <span id="spinner" class="spinner" style="display:none;"></span>
          </button>
        </form>

        <div id="payment-message" class="payment-message"></div>
      </div>
    </div>
  </section>

  <script src="products.js"></script>
  <script src="script.js"></script>
  <script src="checkout-page.js"></script>
</body>
</html>
