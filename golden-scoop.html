<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Scoop | Strong Spoon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#009688">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Strong Spoon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cart-nav">
    <a href="cart.html" class="cart-icon">
      🛒 <span class="cart-count">0</span>
    </a>
  </div>

  <section class="product-container">
    <h1 class="product-title">Golden Scoop</h1>
    <div class="product-image">
      <img src="vanilla.png" alt="Strong Spoon Cup" class="cup-png">
    </div>

    <div class="ingredients">
      <h3>Ingredients:</h3>
      <p>
        Greek Yogurt, Whey protein, Almonds, Cashews, Peanuts, Raisins, 
        Walnut, Apple, Blueberries, 
        No sugar added, 40g+ protein until customised.
      </p>
    </div>

    <div class="product-price">
      <h2 id="productPrice">$11.99</h2>
      <p class="product-size">Size: 250g</p>
    </div>

    <a href="Customise.html?flavor=Golden%20Scoop" class="btn teal">Customise Your Cup</a>
    
    <a href="Html2.html" class="back-link">← Back to Flavours</a>
  </section>

  <script src="products.js"></script>
  <script src="script.js"></script>
  <script>
    if (typeof OFFER_MODE !== 'undefined') {
      const taxNote = document.getElementById('taxIncludedProduct');
      if (taxNote) {
        taxNote.style.display = OFFER_MODE ? 'inline' : 'none';
      }
    }
    const priceEl = document.getElementById('productPrice');
    if (priceEl && typeof PRODUCT_PRICE !== 'undefined') {
      const taxSpan = priceEl.querySelector('#taxIncludedProduct');
      const taxHTML = taxSpan ? taxSpan.outerHTML : '';
      priceEl.innerHTML = '$' + (PRODUCT_PRICE % 1 === 0 ? PRODUCT_PRICE : PRODUCT_PRICE.toFixed(2)) + ' ' + taxHTML;
    }
  </script>
</body>
</html>
