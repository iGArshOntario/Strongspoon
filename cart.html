<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Strong Spoon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#015A64">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Strong Spoon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <section class="cart-container">
    <div class="cart-header">
      <h1 class="cart-title">YOUR CART</h1>
      <a href="Html2.html" class="btn-link">← Continue Shopping</a>
    </div>

    <div class="service-area-notice">
      📍 Currently serving <strong>Regina, SK</strong> only
    </div>

    <div id="cartItems" class="cart-items">
    </div>


    <div class="cart-summary">
      <div class="summary-row total">
        <span><strong>Total:</strong></span>
        <span id="total"><strong>$0.00</strong></span>
      </div>
      <div id="taxIncluded" class="tax-included-note">
        Tax Included
      </div>
    </div>

    <div class="cart-actions">
      <button id="clearCart" class="btn grey">Clear Cart</button>
      <a href="checkout.html" id="checkoutBtn" class="btn teal">Proceed to Checkout</a>
    </div>
  </section>

  <script>
    // Check if website should be in countdown mode
    const launchDate = new Date('2026-04-10T08:00:00-05:00').getTime();
    const now = new Date().getTime();
    
    if (new URLSearchParams(window.location.search).get('preview') === 'strongspoon') {
      localStorage.setItem('ss_preview', 'true');
    }
    
    if (now < launchDate && localStorage.getItem('ss_preview') !== 'true') {
      window.location.href = '/countdown.html';
    }
  </script>

  <script src="products.js"></script>
  <script src="script.js"></script>
  <script src="cart-page.js"></script>
<script src="/track.js" defer></script>
</body>
</html>
