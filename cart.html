<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Strong Spoon</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <section class="cart-container">
    <div class="cart-header">
      <h1 class="cart-title">YOUR CART</h1>
      <a href="Html2.html" class="btn-link">← Continue Shopping</a>
    </div>

    <div id="cartItems" class="cart-items">
    </div>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Subtotal:</span>
        <span id="subtotal">$0.00</span>
      </div>
      <div class="summary-row">
        <span>Tax (13% HST):</span>
        <span id="tax">$0.00</span>
      </div>
      <div class="summary-row total">
        <span><strong>Total:</strong></span>
        <span id="total"><strong>$0.00</strong></span>
      </div>
    </div>

    <div class="cart-actions">
      <button id="clearCart" class="btn grey">Clear Cart</button>
      <a href="checkout.html" id="checkoutBtn" class="btn teal">Proceed to Checkout</a>
    </div>
  </section>

  <script src="products.js"></script>
  <script src="script.js"></script>
  <script src="cart-page.js"></script>
</body>
</html>
