<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Strong Spoon Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container {
      max-width: 1400px;
      width: 100%;
      margin: 20px auto;
      padding: 20px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .admin-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: slideUp 0.8s ease-out;
    }

    .stats-container {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      flex: 1;
      min-width: 200px;
      animation: fadeIn 0.8s ease-out;
    }

    .stat-label {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #00bfa5;
    }

    .orders-table {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      overflow: hidden;
      animation: fadeIn 0.8s ease-out;
    }

    .orders-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .orders-table th {
      background: rgba(0, 191, 165, 0.1);
      color: #00bfa5;
      padding: 15px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .orders-table td {
      padding: 15px 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.9rem;
    }

    .orders-table tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .order-number {
      font-weight: 600;
      color: #00bfa5;
      font-family: monospace;
    }

    .order-items {
      max-width: 300px;
    }

    .order-item {
      margin-bottom: 8px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .order-toppings {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 4px;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-pending {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .status-completed {
      background: rgba(33, 150, 243, 0.2);
      color: #2196f3;
    }

    .status-delivered {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }

    .status-select {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .status-select:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .delivery-proof-btn {
      background: rgba(0, 191, 165, 0.2);
      border: 1px solid #00bfa5;
      color: #00bfa5;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      margin-top: 5px;
    }

    .delivery-proof-btn:hover {
      background: rgba(0, 191, 165, 0.3);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      max-width: 800px;
      max-height: 90vh;
      position: relative;
    }

    .modal-content img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 12px;
    }

    .modal-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: #00bfa5;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      font-size: 1.2rem;
      color: #aaa;
    }

    .no-orders {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    @media (max-width: 768px) {
      .admin-title {
        font-size: 2rem;
      }

      .orders-table {
        overflow-x: auto;
      }

      .orders-table table {
        min-width: 800px;
      }
    }
  </style>
</head>
<body>
  <div class="cart-nav">
    <a href="index.html" class="cart-icon">
      🏠 <span style="font-size: 0.9rem;">Home</span>
    </a>
  </div>

  <div class="admin-container">
    <div class="admin-header">
      <h1 class="admin-title">Order Management</h1>
    </div>

    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-label">Pending Orders</div>
        <div class="stat-value" style="color: #ffc107;" id="pendingOrders">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed Orders</div>
        <div class="stat-value" style="color: #2196f3;" id="completedOrders">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Delivered Orders</div>
        <div class="stat-value" style="color: #4caf50;" id="deliveredOrders">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="totalRevenue">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today's Orders</div>
        <div class="stat-value" id="todayOrders">-</div>
      </div>
    </div>

    <div class="orders-table">
      <div id="ordersContainer" class="loading">
        Loading orders...
      </div>
    </div>
  </div>

  <div id="deliveryProofModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeDeliveryProof()">Close</button>
      <img id="deliveryProofImage" src="" alt="Delivery Proof">
      <div style="margin-top: 15px; color: white; text-align: center;">
        <p id="deliveryInfo"></p>
      </div>
    </div>
  </div>

  <script>
    let adminCredentials = null;
    
    function promptAdminLogin() {
      const password = prompt('Enter admin password:');
      if (!password) {
        return null;
      }
      const credentials = btoa('admin:' + password);
      return credentials;
    }
    
    async function changeOrderStatus(orderId, newStatus) {
      try {
        const response = await fetch(`/admin/orders/${orderId}/status`, {
          method: 'PUT',
          headers: {
            'Authorization': 'Basic ' + adminCredentials,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ status: newStatus })
        });
        
        if (!response.ok) {
          throw new Error('Failed to update status');
        }
        
        loadOrders();
      } catch (error) {
        console.error('Error updating status:', error);
        alert('Failed to update order status');
      }
    }

    function showDeliveryProof(deliveryProof, deliveryPerson, deliveredAt) {
      document.getElementById('deliveryProofImage').src = deliveryProof;
      document.getElementById('deliveryInfo').textContent = 
        `Delivered by: ${deliveryPerson} on ${new Date(deliveredAt).toLocaleString()}`;
      document.getElementById('deliveryProofModal').classList.add('active');
    }

    function closeDeliveryProof() {
      document.getElementById('deliveryProofModal').classList.remove('active');
    }

    async function loadOrders() {
      try {
        // Get credentials if not already set
        if (!adminCredentials) {
          adminCredentials = promptAdminLogin();
          if (!adminCredentials) {
            document.getElementById('ordersContainer').innerHTML = 
              '<div class="no-orders"><h2>Login Required</h2><p>Please refresh the page and enter admin credentials.</p></div>';
            return;
          }
        }

        // Load statistics
        const statsResponse = await fetch('/admin/orders/stats', {
          headers: {
            'Authorization': 'Basic ' + adminCredentials
          }
        });
        
        if (statsResponse.ok) {
          const stats = await statsResponse.json();
          document.getElementById('pendingOrders').textContent = stats.pending || 0;
          document.getElementById('completedOrders').textContent = stats.completed || 0;
          document.getElementById('deliveredOrders').textContent = stats.delivered || 0;
          document.getElementById('totalRevenue').textContent = `$${stats.totalRevenue.toFixed(2)}`;
          document.getElementById('todayOrders').textContent = stats.todayOrders || 0;
        }
        
        const response = await fetch('/admin/orders', {
          headers: {
            'Authorization': 'Basic ' + adminCredentials
          }
        });
        
        // Handle authentication failure
        if (response.status === 401) {
          alert('Invalid admin credentials. Please try again.');
          adminCredentials = null;
          loadOrders();
          return;
        }
        
        if (!response.ok) {
          throw new Error('Failed to fetch orders');
        }
        
        const data = await response.json();
        
        const orders = data.orders || [];
        
        // Render orders table
        const container = document.getElementById('ordersContainer');
        
        if (orders.length === 0) {
          container.innerHTML = '<div class="no-orders"><h2>No orders yet</h2><p>Orders will appear here once customers make purchases.</p></div>';
          return;
        }
        
        const tableHTML = `
          <table>
            <thead>
              <tr>
                <th>Order #</th>
                <th>Customer</th>
                <th>Contact</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Scheduled For</th>
                <th>Delivery</th>
                <th>Order Date</th>
              </tr>
            </thead>
            <tbody>
              ${orders.map(order => {
                // Safely parse items with fallback to empty array
                let items = [];
                try {
                  if (Array.isArray(order.items)) {
                    items = order.items;
                  } else if (typeof order.items === 'string' && order.items.trim()) {
                    items = JSON.parse(order.items);
                  } else if (order.items && typeof order.items === 'object') {
                    items = [order.items];
                  }
                } catch (e) {
                  console.error('Failed to parse items for order:', order.order_number, e);
                  items = [];
                }
                if (!Array.isArray(items)) items = [];
                
                const date = new Date(order.created_at);
                
                return `
                  <tr>
                    <td><span class="order-number">${order.order_number}</span></td>
                    <td>
                      <strong>${order.customer_name || 'Unknown'}</strong><br>
                      ${order.customer_address || ''}
                    </td>
                    <td>
                      ${order.customer_email || ''}<br>
                      ${order.customer_phone || ''}
                    </td>
                    <td class="order-items">
                      ${items.length > 0 ? items.map(item => `
                        <div class="order-item">
                          <strong>${item.name || 'Item'}</strong> (${item.size || 'N/A'}) × ${item.quantity || 1}
                          ${item.toppings && item.toppings.length > 0 ? `
                            <div class="order-toppings">+ ${item.toppings.join(', ')}</div>
                          ` : ''}
                        </div>
                      `).join('') : '<span style="color: #666;">No items</span>'}
                    </td>
                    <td><strong>$${parseFloat(order.total_amount).toFixed(2)}</strong></td>
                    <td>
                      <select class="status-select" onchange="changeOrderStatus(${order.id}, this.value)">
                        <option value="pending" ${order.order_status === 'pending' ? 'selected' : ''}>Pending</option>
                        <option value="completed" ${order.order_status === 'completed' ? 'selected' : ''}>Completed</option>
                        <option value="delivered" ${order.order_status === 'delivered' ? 'selected' : ''}>Delivered</option>
                      </select>
                    </td>
                    <td>
                      ${order.delivery_date ? `
                        <div style="font-weight: 600; color: #00bfa5;">📅 ${new Date(order.delivery_date).toLocaleDateString('en-CA', { timeZone: 'America/Toronto', month: 'short', day: 'numeric', year: 'numeric' })}</div>
                        <div style="color: #aaa; font-size: 0.85rem;">⏰ ${order.delivery_time_slot || 'Not specified'}</div>
                      ` : '<span style="color: #666; font-size: 0.85rem;">Not scheduled</span>'}
                    </td>
                    <td>
                      ${order.delivery_proof ? `
                        <button class="delivery-proof-btn" onclick='showDeliveryProof(\`${order.delivery_proof}\`, "${order.delivery_person}", "${order.delivered_at}")'>
                          View Proof
                        </button>
                      ` : '<span style="color: #666; font-size: 0.85rem;">No proof</span>'}
                    </td>
                    <td>${date.toLocaleDateString('en-CA', { timeZone: 'America/Toronto' })}<br>${date.toLocaleTimeString('en-CA', { timeZone: 'America/Toronto' })}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;
        
        container.innerHTML = tableHTML;
      } catch (error) {
        console.error('Error loading orders:', error);
        document.getElementById('ordersContainer').innerHTML = 
          '<div class="no-orders"><h2>Error loading orders</h2><p>Please try refreshing the page.</p></div>';
      }
    }
    
    loadOrders();
    
    // Auto-refresh every 30 seconds
    setInterval(loadOrders, 30000);
  </script>
</body>
</html>
