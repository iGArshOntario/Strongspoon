<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Strong Spoon Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container {
      max-width: 1400px;
      width: 100%;
      margin: 20px auto;
      padding: 20px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .admin-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: slideUp 0.8s ease-out;
    }

    .stats-container {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      flex: 1;
      min-width: 200px;
      animation: fadeIn 0.8s ease-out;
    }

    .stat-label {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #00bfa5;
    }

    .orders-table {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      overflow: hidden;
      animation: fadeIn 0.8s ease-out;
    }

    .orders-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .orders-table th {
      background: rgba(0, 191, 165, 0.1);
      color: #00bfa5;
      padding: 15px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .orders-table td {
      padding: 15px 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.9rem;
    }

    .orders-table tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .order-number {
      font-weight: 600;
      color: #00bfa5;
      font-family: monospace;
    }

    .order-items {
      max-width: 300px;
    }

    .order-item {
      margin-bottom: 8px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .order-toppings {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 4px;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-completed {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      font-size: 1.2rem;
      color: #aaa;
    }

    .no-orders {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    @media (max-width: 768px) {
      .admin-title {
        font-size: 2rem;
      }

      .orders-table {
        overflow-x: auto;
      }

      .orders-table table {
        min-width: 800px;
      }
    }
  </style>
</head>
<body>
  <div class="cart-nav">
    <a href="index.html" class="cart-icon">
      🏠 <span style="font-size: 0.9rem;">Home</span>
    </a>
  </div>

  <div class="admin-container">
    <div class="admin-header">
      <h1 class="admin-title">Order Management</h1>
    </div>

    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="totalOrders">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="totalRevenue">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today's Orders</div>
        <div class="stat-value" id="todayOrders">-</div>
      </div>
    </div>

    <div class="orders-table">
      <div id="ordersContainer" class="loading">
        Loading orders...
      </div>
    </div>
  </div>

  <script>
    let adminCredentials = null;
    
    function promptAdminLogin() {
      const password = prompt('Enter admin password:');
      if (!password) {
        return null;
      }
      const credentials = btoa('admin:' + password);
      return credentials;
    }
    
    async function loadOrders() {
      try {
        // Get credentials if not already set
        if (!adminCredentials) {
          adminCredentials = promptAdminLogin();
          if (!adminCredentials) {
            document.getElementById('ordersContainer').innerHTML = 
              '<div class="no-orders"><h2>Login Required</h2><p>Please refresh the page and enter admin credentials.</p></div>';
            return;
          }
        }
        
        const response = await fetch('/admin/orders', {
          headers: {
            'Authorization': 'Basic ' + adminCredentials
          }
        });
        
        // Handle authentication failure
        if (response.status === 401) {
          alert('Invalid admin credentials. Please try again.');
          adminCredentials = null;
          loadOrders();
          return;
        }
        
        if (!response.ok) {
          throw new Error('Failed to fetch orders');
        }
        
        const data = await response.json();
        
        const orders = data.orders || [];
        
        // Calculate stats
        const totalOrders = orders.length;
        const totalRevenue = orders.reduce((sum, order) => sum + parseFloat(order.total_amount), 0);
        
        const today = new Date().toDateString();
        const todayOrders = orders.filter(order => {
          const orderDate = new Date(order.created_at).toDateString();
          return orderDate === today;
        }).length;
        
        // Update stats
        document.getElementById('totalOrders').textContent = totalOrders;
        document.getElementById('totalRevenue').textContent = `$${totalRevenue.toFixed(2)}`;
        document.getElementById('todayOrders').textContent = todayOrders;
        
        // Render orders table
        const container = document.getElementById('ordersContainer');
        
        if (orders.length === 0) {
          container.innerHTML = '<div class="no-orders"><h2>No orders yet</h2><p>Orders will appear here once customers make purchases.</p></div>';
          return;
        }
        
        const tableHTML = `
          <table>
            <thead>
              <tr>
                <th>Order #</th>
                <th>Customer</th>
                <th>Contact</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>
              ${orders.map(order => {
                const items = JSON.parse(order.items);
                const date = new Date(order.created_at);
                
                return `
                  <tr>
                    <td><span class="order-number">${order.order_number}</span></td>
                    <td>
                      <strong>${order.customer_name}</strong><br>
                      ${order.customer_address || ''}
                    </td>
                    <td>
                      ${order.customer_email}<br>
                      ${order.customer_phone || ''}
                    </td>
                    <td class="order-items">
                      ${items.map(item => `
                        <div class="order-item">
                          <strong>${item.name}</strong> (${item.size}) × ${item.quantity}
                          ${item.toppings && item.toppings.length > 0 ? `
                            <div class="order-toppings">+ ${item.toppings.join(', ')}</div>
                          ` : ''}
                        </div>
                      `).join('')}
                    </td>
                    <td><strong>$${parseFloat(order.total_amount).toFixed(2)}</strong></td>
                    <td>
                      <span class="status-badge status-${order.order_status}">
                        ${order.order_status}
                      </span>
                    </td>
                    <td>${date.toLocaleDateString()} ${date.toLocaleTimeString()}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;
        
        container.innerHTML = tableHTML;
      } catch (error) {
        console.error('Error loading orders:', error);
        document.getElementById('ordersContainer').innerHTML = 
          '<div class="no-orders"><h2>Error loading orders</h2><p>Please try refreshing the page.</p></div>';
      }
    }
    
    loadOrders();
    
    // Auto-refresh every 30 seconds
    setInterval(loadOrders, 30000);
  </script>
</body>
</html>
