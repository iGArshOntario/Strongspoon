<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery - Strong Spoon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#009688">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Strong Spoon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      padding-bottom: 80px;
    }

    .delivery-container {
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
    }

    .delivery-header {
      text-align: center;
      margin-bottom: 30px;
      animation: fadeIn 0.8s ease-out;
    }

    .delivery-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00bfa5;
      margin-bottom: 10px;
    }

    .delivery-subtitle {
      color: #aaa;
      font-size: 0.9rem;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      animation: fadeIn 0.8s ease-out;
    }

    .order-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      animation: slideUp 0.8s ease-out;
    }

    .order-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .order-number {
      font-family: monospace;
      color: #00bfa5;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .order-status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .customer-info {
      margin-bottom: 15px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }

    .customer-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 5px;
      color: white;
    }

    .customer-address {
      color: #00bfa5;
      margin-bottom: 5px;
      font-size: 0.95rem;
    }

    .customer-phone {
      color: #aaa;
      font-size: 0.9rem;
    }

    .order-items-list {
      margin-bottom: 15px;
    }

    .order-item {
      padding: 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .deliver-btn {
      background: #00bfa5;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
    }

    .deliver-btn:hover {
      background: #00a08a;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 191, 165, 0.3);
    }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .no-orders {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.active {
      display: block;
    }

    .modal-content {
      max-width: 500px;
      margin: 20px auto;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #00bfa5;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      color: #aaa;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
    }

    .form-input:focus {
      outline: none;
      border-color: #00bfa5;
    }

    .camera-container {
      position: relative;
      width: 100%;
      margin-bottom: 20px;
    }

    #cameraPreview {
      width: 100%;
      border-radius: 8px;
      background: #000;
      display: none;
    }

    #photoPreview {
      width: 100%;
      border-radius: 8px;
      display: none;
    }

    .camera-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #00bfa5;
      color: white;
    }

    .btn-primary:hover {
      background: #00a08a;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-danger {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
      border: 1px solid #f44336;
    }

    .submit-btn {
      background: #00bfa5;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
    }

    .submit-btn:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="cart-nav">
    <a href="index.html" class="cart-icon">
      🏠 <span style="font-size: 0.9rem;">Home</span>
    </a>
  </div>

  <div class="delivery-container">
    <div class="delivery-header">
      <h1 class="delivery-title">📦 Delivery Portal</h1>
      <p class="delivery-subtitle">Orders ready for delivery</p>
    </div>

    <div id="ordersContainer" class="loading-state">
      Loading orders...
    </div>
  </div>

  <!-- Delivery Proof Modal -->
  <div id="deliveryModal" class="modal">
    <div class="modal-content">
      <h2 class="modal-title">Complete Delivery</h2>
      
      <div class="form-group">
        <label class="form-label">Order Number</label>
        <div id="modalOrderNumber" style="color: #00bfa5; font-family: monospace; font-size: 1.2rem; font-weight: 700;"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Your Name *</label>
        <input type="text" id="deliveryPersonName" class="form-input" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label class="form-label">Delivery Proof Photo *</label>
        <div class="camera-container">
          <video id="cameraPreview" autoplay playsinline></video>
          <img id="photoPreview" alt="Photo preview">
          <input type="file" id="photoInput" accept="image/*" capture="environment" style="display: none;">
        </div>
        
        <div class="camera-buttons">
          <button id="startCameraBtn" class="btn btn-primary">📷 Take Photo</button>
          <button id="captureBtn" class="btn btn-primary hidden">📸 Capture</button>
          <button id="retakeBtn" class="btn btn-secondary hidden">🔄 Retake</button>
        </div>
      </div>

      <button id="submitProofBtn" class="submit-btn" disabled>Submit Delivery Proof</button>
      
      <button class="btn btn-danger" style="margin-top: 15px;" onclick="closeDeliveryModal()">Cancel</button>
    </div>
  </div>

  <script>
    let currentOrderId = null;
    let photoData = null;
    let cameraStream = null;
    let deliveryCredentials = null;

    function promptDeliveryLogin() {
      const password = prompt('Enter delivery access password:');
      if (!password) {
        return null;
      }
      const credentials = btoa('delivery:' + password);
      return credentials;
    }

    async function loadOrders() {
      try {
        // Get credentials if not already set
        if (!deliveryCredentials) {
          deliveryCredentials = promptDeliveryLogin();
          if (!deliveryCredentials) {
            document.getElementById('ordersContainer').innerHTML = 
              '<div class="no-orders"><h2>Login Required</h2><p>Please refresh the page and enter delivery credentials.</p></div>';
            return;
          }
        }

        const response = await fetch('/delivery/orders', {
          headers: {
            'Authorization': 'Basic ' + deliveryCredentials
          }
        });
        
        // Handle authentication failure
        if (response.status === 401) {
          alert('Invalid delivery credentials. Please try again.');
          deliveryCredentials = null;
          loadOrders();
          return;
        }
        
        if (!response.ok) {
          throw new Error('Failed to fetch orders');
        }
        
        const data = await response.json();
        const orders = data.orders || [];
        
        const container = document.getElementById('ordersContainer');
        
        if (orders.length === 0) {
          container.innerHTML = `
            <div class="no-orders">
              <h2>✅ All Caught Up!</h2>
              <p>No orders pending delivery at the moment.</p>
              <p style="margin-top: 20px; font-size: 0.9rem;">Check back soon for new deliveries.</p>
            </div>
          `;
          return;
        }
        
        container.innerHTML = orders.map(order => {
          const items = JSON.parse(order.items);
          const date = new Date(order.created_at);
          
          return `
            <div class="order-card">
              <div class="order-card-header">
                <span class="order-number">${order.order_number}</span>
                <span class="order-status-badge">${order.order_status}</span>
              </div>
              
              <div class="customer-info">
                <div class="customer-name">👤 ${order.customer_name}</div>
                ${order.customer_address ? `<div class="customer-address">📍 ${order.customer_address}</div>` : ''}
                ${order.customer_phone ? `<div class="customer-phone">📞 ${order.customer_phone}</div>` : ''}
              </div>
              
              <div class="order-items-list">
                ${items.map(item => `
                  <div class="order-item">
                    <strong>${item.name}</strong> (${item.size}) × ${item.quantity}
                    ${item.toppings && item.toppings.length > 0 ? `<br><small style="color: #aaa;">+ ${item.toppings.map(t => t.name).join(', ')}</small>` : ''}
                  </div>
                `).join('')}
              </div>
              
              <div style="color: #aaa; font-size: 0.85rem; margin-bottom: 15px;">
                📅 Ordered: ${date.toLocaleDateString()} ${date.toLocaleTimeString()}
              </div>
              
              <button class="deliver-btn" onclick="openDeliveryModal(${order.id}, '${order.order_number}')">
                ✅ Mark as Delivered
              </button>
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error('Error loading orders:', error);
        document.getElementById('ordersContainer').innerHTML = `
          <div class="no-orders">
            <h2>⚠️ Error Loading Orders</h2>
            <p>Please check your connection and try again.</p>
          </div>
        `;
      }
    }

    function openDeliveryModal(orderId, orderNumber) {
      currentOrderId = orderId;
      document.getElementById('modalOrderNumber').textContent = orderNumber;
      document.getElementById('deliveryModal').classList.add('active');
      document.getElementById('deliveryPersonName').value = '';
      resetCamera();
    }

    function closeDeliveryModal() {
      document.getElementById('deliveryModal').classList.remove('active');
      currentOrderId = null;
      photoData = null;
      resetCamera();
    }

    function resetCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      document.getElementById('cameraPreview').style.display = 'none';
      document.getElementById('photoPreview').style.display = 'none';
      document.getElementById('startCameraBtn').classList.remove('hidden');
      document.getElementById('captureBtn').classList.add('hidden');
      document.getElementById('retakeBtn').classList.add('hidden');
      document.getElementById('submitProofBtn').disabled = true;
    }

    document.getElementById('startCameraBtn').addEventListener('click', async () => {
      try {
        // Try camera first
        try {
          cameraStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment' } 
          });
          document.getElementById('cameraPreview').srcObject = cameraStream;
          document.getElementById('cameraPreview').style.display = 'block';
          document.getElementById('startCameraBtn').classList.add('hidden');
          document.getElementById('captureBtn').classList.remove('hidden');
        } catch (err) {
          // Fallback to file input
          document.getElementById('photoInput').click();
        }
      } catch (error) {
        alert('Could not access camera. Please grant camera permissions.');
      }
    });

    document.getElementById('photoInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          photoData = event.target.result;
          document.getElementById('photoPreview').src = photoData;
          document.getElementById('photoPreview').style.display = 'block';
          document.getElementById('startCameraBtn').classList.add('hidden');
          document.getElementById('retakeBtn').classList.remove('hidden');
          validateForm();
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('captureBtn').addEventListener('click', () => {
      const video = document.getElementById('cameraPreview');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      photoData = canvas.toDataURL('image/jpeg', 0.8);
      
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
      }
      
      document.getElementById('cameraPreview').style.display = 'none';
      document.getElementById('photoPreview').src = photoData;
      document.getElementById('photoPreview').style.display = 'block';
      document.getElementById('captureBtn').classList.add('hidden');
      document.getElementById('retakeBtn').classList.remove('hidden');
      validateForm();
    });

    document.getElementById('retakeBtn').addEventListener('click', () => {
      photoData = null;
      resetCamera();
    });

    document.getElementById('deliveryPersonName').addEventListener('input', validateForm);

    function validateForm() {
      const name = document.getElementById('deliveryPersonName').value.trim();
      const submitBtn = document.getElementById('submitProofBtn');
      submitBtn.disabled = !(name && photoData);
    }

    document.getElementById('submitProofBtn').addEventListener('click', async () => {
      const name = document.getElementById('deliveryPersonName').value.trim();
      
      if (!name || !photoData) {
        alert('Please fill in all fields and take a photo');
        return;
      }

      const submitBtn = document.getElementById('submitProofBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        const response = await fetch(`/delivery/orders/${currentOrderId}/proof`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Basic ' + deliveryCredentials
          },
          body: JSON.stringify({
            deliveryProof: photoData,
            deliveryPerson: name
          })
        });

        if (!response.ok) {
          throw new Error('Failed to submit delivery proof');
        }

        alert('✅ Delivery proof submitted successfully!');
        closeDeliveryModal();
        loadOrders();
      } catch (error) {
        console.error('Error submitting proof:', error);
        alert('Failed to submit delivery proof. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Delivery Proof';
      }
    });

    loadOrders();
    setInterval(loadOrders, 30000);
  </script>
</body>
</html>
