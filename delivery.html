<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery - Strong Spoon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#015A64">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Strong Spoon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      padding-bottom: 80px;
    }

    /* ── Premium Login Overlay ──────────────────────────────────── */
    #loginOverlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at top, #011e22 0%, #000 70%);
      padding: 24px;
    }
    #loginOverlay.hidden { display: none; }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(1,125,142,0.3);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 0 60px rgba(1,90,100,0.25), 0 20px 60px rgba(0,0,0,0.5);
      animation: loginFadeIn 0.5s ease-out;
    }
    @keyframes loginFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-card.shake {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-10px); }
      40%      { transform: translateX(10px); }
      60%      { transform: translateX(-8px); }
      80%      { transform: translateX(6px); }
    }

    .login-lock-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #015A64, #017d8e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(1,125,142,0.4);
    }
    .login-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #EFE8D8;
      margin-bottom: 4px;
    }
    .login-portal-name {
      font-size: 0.78rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #017d8e;
      margin-bottom: 32px;
    }
    .login-field-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .login-field-wrap input {
      width: 100%;
      padding: 14px 48px 14px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #EFE8D8;
      font-size: 1rem;
      letter-spacing: 2px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .login-field-wrap input:focus {
      outline: none;
      border-color: #017d8e;
      background: rgba(1,125,142,0.08);
    }
    .login-eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      font-size: 1rem;
      padding: 0;
      transition: color 0.2s;
    }
    .login-eye-btn:hover { color: #EFE8D8; }
    .login-error {
      color: #f44336;
      font-size: 0.85rem;
      margin-bottom: 14px;
      min-height: 18px;
    }
    .login-submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #015A64, #017d8e);
      color: #EFE8D8;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(1,125,142,0.3);
    }
    .login-submit-btn:hover {
      background: linear-gradient(135deg, #017d8e, #00a08a);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(1,125,142,0.5);
    }
    .login-submit-btn:disabled {
      background: #333;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .login-footer {
      margin-top: 20px;
      color: #555;
      font-size: 0.78rem;
      letter-spacing: 1px;
    }
    /* ── End Login Overlay ──────────────────────────────────────── */

    .delivery-container {
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
    }

    .delivery-header {
      text-align: center;
      margin-bottom: 30px;
      animation: fadeIn 0.8s ease-out;
    }

    .delivery-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #017d8e;
      margin-bottom: 10px;
    }

    .delivery-subtitle {
      color: #aaa;
      font-size: 0.9rem;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      animation: fadeIn 0.8s ease-out;
    }

    .order-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      animation: slideUp 0.8s ease-out;
    }

    .order-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .order-number {
      font-family: monospace;
      color: #017d8e;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .order-status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .customer-info {
      margin-bottom: 15px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }

    .customer-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 5px;
      color: #EFE8D8;
    }

    .customer-address {
      color: #017d8e;
      margin-bottom: 5px;
      font-size: 0.95rem;
    }

    .customer-phone {
      color: #aaa;
      font-size: 0.9rem;
    }

    .order-items-list {
      margin-bottom: 15px;
    }

    .order-item {
      padding: 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .deliver-btn {
      background: #017d8e;
      color: #EFE8D8;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
    }

    .deliver-btn:hover {
      background: #00a08a;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 191, 165, 0.3);
    }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .no-orders {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.active {
      display: block;
    }

    .modal-content {
      max-width: 500px;
      margin: 20px auto;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #017d8e;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      color: #aaa;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #EFE8D8;
      font-size: 1rem;
    }

    .form-input:focus {
      outline: none;
      border-color: #017d8e;
    }

    .camera-container {
      position: relative;
      width: 100%;
      margin-bottom: 20px;
    }

    #cameraPreview {
      width: 100%;
      border-radius: 8px;
      background: #000;
      display: none;
    }

    #photoPreview {
      width: 100%;
      border-radius: 8px;
      display: none;
    }

    .camera-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #017d8e;
      color: #EFE8D8;
    }

    .btn-primary:hover {
      background: #00a08a;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #EFE8D8;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-danger {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
      border: 1px solid #f44336;
    }

    .submit-btn {
      background: #017d8e;
      color: #EFE8D8;
      border: none;
      padding: 15px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
    }

    .submit-btn:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .hidden {
      display: none;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 40px 0 20px 0;
      color: #017d8e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .past-deliveries-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-top: 30px;
    }

    .past-delivery-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .past-delivery-info {
      flex: 1;
      min-width: 200px;
    }

    .past-delivery-proof {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
    }

    .delivered-badge {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* ── Tap-to-action contact links ─────────────────────────────── */
    .contact-link {
      display: block;
      color: #017d8e;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 10px 12px;
      margin-bottom: 6px;
      background: rgba(1,125,142,0.08);
      border: 1px solid rgba(1,125,142,0.25);
      border-radius: 8px;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: rgba(1,125,142,0.3);
    }
    .contact-link:active { background: rgba(1,125,142,0.25); transform: scale(0.98); }
    .contact-link:hover { background: rgba(1,125,142,0.18); border-color: #017d8e; }
    .map-link { color: #4fd1c5; font-weight: 600; }
    .map-link .contact-cta {
      float: right;
      background: #015A64;
      color: #fff;
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .phone-link { flex: 1; text-align: center; font-weight: 600; }
    .contact-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .contact-pill {
      background: linear-gradient(135deg, #015A64, #017d8e);
      color: #fff;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: rgba(1,125,142,0.5);
    }
    .contact-pill:active { transform: scale(0.96); }

    /* ── Summary stats bar ──────────────────────────────────────── */
    .summary-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      animation: fadeIn 0.6s ease-out;
    }
    .summary-stat {
      flex: 1;
      background: rgba(1,125,142,0.1);
      border: 1px solid rgba(1,125,142,0.3);
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
    }
    .summary-stat .num {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #4fd1c5;
      display: block;
      line-height: 1;
    }
    .summary-stat .lbl {
      font-size: 0.7rem;
      color: #888;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-top: 4px;
      display: block;
    }
    .summary-stat.urgent { background: rgba(244,67,54,0.12); border-color: rgba(244,67,54,0.4); }
    .summary-stat.urgent .num { color: #ff6b6b; }

    /* ── Logout button ──────────────────────────────────────────── */
    .logout-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      background: rgba(244,67,54,0.15);
      color: #ff6b6b;
      border: 1px solid rgba(244,67,54,0.3);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      z-index: 1000;
      backdrop-filter: blur(8px);
      transition: all 0.2s ease;
    }
    .logout-btn:hover { background: rgba(244,67,54,0.3); }
    .logout-btn.hidden { display: none; }

    /* ── Auto-refresh indicator ─────────────────────────────────── */
    .refresh-tag {
      text-align: center;
      color: #555;
      font-size: 0.72rem;
      margin: 8px 0 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .refresh-tag .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #4caf50;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Premium Login Overlay -->
  <div id="loginOverlay">
    <div class="login-card" id="loginCard">
      <div class="login-lock-icon">🚚</div>
      <div class="login-brand">Strong Spoon</div>
      <div class="login-portal-name">Delivery Portal</div>
      <form onsubmit="event.preventDefault(); attemptLogin();">
        <div class="login-field-wrap">
          <input type="password" id="loginPasswordInput" placeholder="Enter access password" autocomplete="current-password">
          <button class="login-eye-btn" id="loginEyeBtn" type="button" onclick="toggleLoginPwd()">👁</button>
        </div>
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="login-submit-btn" id="loginSubmitBtn">Access Portal</button>
      </form>
      <div class="login-footer">Secured · Strong Spoon · Regina, SK</div>
    </div>
  </div>

  <button class="logout-btn hidden" id="logoutBtn" onclick="doLogout()">🚪 Logout</button>

  <div class="cart-nav">
    <a href="index.html" class="cart-icon">
      🏠 <span style="font-size: 0.9rem;">Home</span>
    </a>
  </div>

  <div class="delivery-container">
    <div class="delivery-header">
      <h1 class="delivery-title">📦 Delivery Portal</h1>
      <p class="delivery-subtitle">Orders ready for delivery</p>
    </div>

    <div id="summaryBar" class="summary-bar" style="display:none;"></div>

    <div id="ordersContainer" class="loading-state">
      Loading orders...
    </div>

    <div class="refresh-tag" id="refreshTag" style="display:none;">
      <span class="dot"></span>Live · Auto-refreshing every 60s
    </div>

    <h2 class="section-title">✅ Past Deliveries (24 Hours)</h2>
    <div class="past-deliveries-section">
      <div id="pastDeliveriesContainer">
        <p style="color: #888; text-align: center;">Loading past deliveries...</p>
      </div>
    </div>
  </div>

  <!-- Delivery Proof Modal -->
  <div id="deliveryModal" class="modal">
    <div class="modal-content">
      <h2 class="modal-title">Complete Delivery</h2>
      
      <div class="form-group">
        <label class="form-label">Order Number</label>
        <div id="modalOrderNumber" style="color: #017d8e; font-family: monospace; font-size: 1.2rem; font-weight: 700;"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Your Name *</label>
        <input type="text" id="deliveryPersonName" class="form-input" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label class="form-label">Delivery Proof Photo *</label>
        <div class="camera-container">
          <video id="cameraPreview" autoplay playsinline></video>
          <img id="photoPreview" alt="Photo preview">
          <input type="file" id="photoInput" accept="image/*" capture="environment" style="display: none;">
        </div>
        
        <div class="camera-buttons">
          <button id="startCameraBtn" class="btn btn-primary">📷 Take Photo</button>
          <button id="captureBtn" class="btn btn-primary hidden">📸 Capture</button>
          <button id="retakeBtn" class="btn btn-secondary hidden">🔄 Retake</button>
        </div>
      </div>

      <button id="submitProofBtn" class="submit-btn" disabled>Submit Delivery Proof</button>
      
      <button class="btn btn-danger" style="margin-top: 15px;" onclick="closeDeliveryModal()">Cancel</button>
    </div>
  </div>

  <script>
    let currentOrderId = null;
    let photoData = null;
    let cameraStream = null;
    let deliveryCredentials = null;

    // ── Premium Login Overlay ──────────────────────────────────────
    function toggleLoginPwd() {
      const input = document.getElementById('loginPasswordInput');
      const btn = document.getElementById('loginEyeBtn');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    async function attemptLogin() {
      const password = document.getElementById('loginPasswordInput').value.trim();
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginSubmitBtn');
      const card = document.getElementById('loginCard');
      if (!password) {
        errorEl.textContent = 'Please enter your access password.';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      errorEl.textContent = '';
      const creds = btoa('delivery:' + password);
      try {
        const res = await fetch('/delivery/orders', { headers: { 'Authorization': 'Basic ' + creds } });
        if (res.status === 401) {
          card.classList.remove('shake');
          void card.offsetWidth;
          card.classList.add('shake');
          errorEl.textContent = 'Incorrect password. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Access Portal';
          document.getElementById('loginPasswordInput').value = '';
          return;
        }
        deliveryCredentials = creds;
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('logoutBtn').classList.remove('hidden');
        loadOrders();
        setTimeout(() => loadPastDeliveries(), 500);
        startAutoRefresh();
      } catch(e) {
        errorEl.textContent = 'Connection error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Access Portal';
      }
    }

    function doLogout() {
      if (!confirm('Log out of the delivery portal?')) return;
      deliveryCredentials = null;
      stopAutoRefresh();
      document.getElementById('logoutBtn').classList.add('hidden');
      document.getElementById('summaryBar').style.display = 'none';
      document.getElementById('refreshTag').style.display = 'none';
      document.getElementById('ordersContainer').innerHTML = '<div class="loading-state">Logged out</div>';
      document.getElementById('pastDeliveriesContainer').innerHTML = '<p style="color: #888; text-align: center;">Login required to view past deliveries</p>';
      document.getElementById('loginPasswordInput').value = '';
      document.getElementById('loginError').textContent = '';
      document.getElementById('loginOverlay').classList.remove('hidden');
    }

    let autoRefreshTimer = null;
    function startAutoRefresh() {
      stopAutoRefresh();
      autoRefreshTimer = setInterval(() => {
        if (deliveryCredentials && !document.getElementById('deliveryModal').classList.contains('active')) {
          loadOrders();
          loadPastDeliveries();
        }
      }, 60000);
    }
    function stopAutoRefresh() {
      if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
    }

    // ── End Login Overlay ──────────────────────────────────────────

    async function loadOrders() {
      try {
        if (!deliveryCredentials) return;

        const response = await fetch('/delivery/orders', {
          headers: {
            'Authorization': 'Basic ' + deliveryCredentials
          }
        });
        
        if (response.status === 401) {
          deliveryCredentials = null;
          document.getElementById('loginError').textContent = 'Session expired. Please log in again.';
          document.getElementById('loginOverlay').classList.remove('hidden');
          return;
        }
        
        if (!response.ok) {
          throw new Error('Failed to fetch orders');
        }
        
        const data = await response.json();
        const orders = data.orders || [];
        
        const container = document.getElementById('ordersContainer');
        
        if (orders.length === 0) {
          container.innerHTML = `
            <div class="no-orders">
              <h2>✅ All Caught Up!</h2>
              <p>No orders pending delivery at the moment.</p>
              <p style="margin-top: 20px; font-size: 0.9rem;">Check back soon for new deliveries.</p>
            </div>
          `;
          document.getElementById('summaryBar').style.display = 'none';
          document.getElementById('refreshTag').style.display = 'block';
          return;
        }

        // Sort orders: soonest delivery date first, then by order date
        orders.sort((a, b) => {
          const ad = a.delivery_date ? a.delivery_date.split('T')[0] : '9999-12-31';
          const bd = b.delivery_date ? b.delivery_date.split('T')[0] : '9999-12-31';
          if (ad !== bd) return ad.localeCompare(bd);
          return new Date(a.created_at) - new Date(b.created_at);
        });

        // Render summary bar: total orders, today count, total cups
        const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Toronto' });
        let todayCount = 0, totalCups = 0;
        orders.forEach(o => {
          if (o.delivery_date && o.delivery_date.split('T')[0] === todayStr) todayCount++;
          let parsed = [];
          try { parsed = Array.isArray(o.items) ? o.items : JSON.parse(o.items || '[]'); } catch (e) {}
          parsed.forEach(it => { totalCups += parseInt(it.quantity) || 1; });
        });
        const summaryBar = document.getElementById('summaryBar');
        summaryBar.innerHTML = `
          <div class="summary-stat ${todayCount > 0 ? 'urgent' : ''}">
            <span class="num">${todayCount}</span><span class="lbl">Today</span>
          </div>
          <div class="summary-stat">
            <span class="num">${orders.length}</span><span class="lbl">Pending</span>
          </div>
          <div class="summary-stat">
            <span class="num">${totalCups}</span><span class="lbl">Cups</span>
          </div>
        `;
        summaryBar.style.display = 'flex';
        document.getElementById('refreshTag').style.display = 'block';

        container.innerHTML = orders.map(order => {
          // Safely parse items with fallback
          let items = [];
          try {
            if (Array.isArray(order.items)) {
              items = order.items;
            } else if (typeof order.items === 'string' && order.items.trim()) {
              items = JSON.parse(order.items);
            } else if (order.items && typeof order.items === 'object') {
              items = [order.items];
            }
          } catch (e) {
            console.error('Failed to parse items:', e);
            items = [];
          }
          if (!Array.isArray(items)) items = [];
          
          const date = new Date(order.created_at);
          
          return `
            <div class="order-card">
              <div class="order-card-header">
                <span class="order-number">${order.order_number}</span>
                <span class="order-status-badge">${order.order_status}</span>
              </div>
              
              ${order.delivery_date ? (() => {
                const dStr = order.delivery_date.split('T')[0];
                const dObj = new Date(dStr + 'T12:00:00');
                const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Toronto' });
                const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
                const tomorrowStr = tomorrow.toLocaleDateString('en-CA', { timeZone: 'America/Toronto' });
                const dCanada = dObj.toLocaleDateString('en-CA', { timeZone: 'America/Toronto' });
                let urgencyBadge = '';
                if (dCanada === todayStr) urgencyBadge = '<span style="background:#f44336;color:#fff;padding:3px 10px;border-radius:6px;font-size:0.72rem;font-weight:800;letter-spacing:1px;margin-left:8px;">🔥 TODAY</span>';
                else if (dCanada === tomorrowStr) urgencyBadge = '<span style="background:#f5c842;color:#000;padding:3px 10px;border-radius:6px;font-size:0.72rem;font-weight:800;letter-spacing:1px;margin-left:8px;">📅 TOMORROW</span>';
                return `
                <div style="background: rgba(0, 191, 165, 0.15); border: 2px solid rgba(0, 191, 165, 0.3); border-radius: 8px; padding: 12px; margin-bottom: 15px;">
                  <div style="font-weight: 700; color: #017d8e; margin-bottom: 5px;">🚚 Scheduled Delivery${urgencyBadge}</div>
                  <div style="font-size: 1rem; font-weight: 600;">📅 ${dObj.toLocaleDateString('en-CA', { timeZone: 'America/Toronto', weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</div>
                </div>
                `;
              })() : ''}
              
              <div class="customer-info">
                <div class="customer-name">👤 ${order.customer_name}</div>
                ${order.customer_address ? `
                  <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(order.customer_address)}" target="_blank" rel="noopener" class="contact-link map-link">
                    📍 ${order.customer_address} <span class="contact-cta">→ Navigate</span>
                  </a>
                ` : ''}
                ${order.customer_phone ? `
                  <div class="contact-row">
                    <a href="tel:${order.customer_phone.replace(/[^0-9+]/g,'')}" class="contact-link phone-link">📞 ${order.customer_phone}</a>
                    <a href="sms:${order.customer_phone.replace(/[^0-9+]/g,'')}?&body=${encodeURIComponent('Hi! Your Strong Spoon order is here. I\'m at your door 🍫💪')}" class="contact-pill">💬 Text</a>
                  </div>
                ` : ''}
              </div>
              
              <div class="order-items-list">
                ${items.length > 0 ? items.map(item => `
                  <div class="order-item">
                    <strong>${item.name || 'Item'}</strong> (${item.size || 'N/A'}) × ${item.quantity || 1}
                    ${item.toppings && item.toppings.length > 0 ? `<br><small style="color: #aaa;">+ ${item.toppings.map(t => typeof t === 'string' ? t : t.name).join(', ')}</small>` : ''}
                  </div>
                `).join('') : '<div class="order-item">No items</div>'}
              </div>
              
              <div style="color: #aaa; font-size: 0.85rem; margin-bottom: 15px;">
                📅 Ordered: ${date.toLocaleDateString('en-CA', { timeZone: 'America/Toronto' })} ${date.toLocaleTimeString('en-CA', { timeZone: 'America/Toronto' })}
              </div>
              
              <button class="deliver-btn" onclick="openDeliveryModal(${order.id}, '${order.order_number}')">
                ✅ Mark as Delivered
              </button>
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error('Error loading orders:', error);
        document.getElementById('ordersContainer').innerHTML = `
          <div class="no-orders">
            <h2>⚠️ Error Loading Orders</h2>
            <p>Please check your connection and try again.</p>
          </div>
        `;
      }
    }

    function openDeliveryModal(orderId, orderNumber) {
      currentOrderId = orderId;
      document.getElementById('modalOrderNumber').textContent = orderNumber;
      document.getElementById('deliveryModal').classList.add('active');
      document.getElementById('deliveryPersonName').value = '';
      resetCamera();
    }

    function closeDeliveryModal() {
      document.getElementById('deliveryModal').classList.remove('active');
      currentOrderId = null;
      photoData = null;
      resetCamera();
    }

    function resetCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      document.getElementById('cameraPreview').style.display = 'none';
      document.getElementById('photoPreview').style.display = 'none';
      document.getElementById('startCameraBtn').classList.remove('hidden');
      document.getElementById('captureBtn').classList.add('hidden');
      document.getElementById('retakeBtn').classList.add('hidden');
      document.getElementById('submitProofBtn').disabled = true;
    }

    document.getElementById('startCameraBtn').addEventListener('click', async () => {
      try {
        // Try camera first
        try {
          cameraStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment' } 
          });
          document.getElementById('cameraPreview').srcObject = cameraStream;
          document.getElementById('cameraPreview').style.display = 'block';
          document.getElementById('startCameraBtn').classList.add('hidden');
          document.getElementById('captureBtn').classList.remove('hidden');
        } catch (err) {
          // Fallback to file input
          document.getElementById('photoInput').click();
        }
      } catch (error) {
        alert('Could not access camera. Please grant camera permissions.');
      }
    });

    document.getElementById('photoInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          photoData = event.target.result;
          document.getElementById('photoPreview').src = photoData;
          document.getElementById('photoPreview').style.display = 'block';
          document.getElementById('startCameraBtn').classList.add('hidden');
          document.getElementById('retakeBtn').classList.remove('hidden');
          validateForm();
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('captureBtn').addEventListener('click', () => {
      const video = document.getElementById('cameraPreview');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      photoData = canvas.toDataURL('image/jpeg', 0.8);
      
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
      }
      
      document.getElementById('cameraPreview').style.display = 'none';
      document.getElementById('photoPreview').src = photoData;
      document.getElementById('photoPreview').style.display = 'block';
      document.getElementById('captureBtn').classList.add('hidden');
      document.getElementById('retakeBtn').classList.remove('hidden');
      validateForm();
    });

    document.getElementById('retakeBtn').addEventListener('click', () => {
      photoData = null;
      resetCamera();
    });

    document.getElementById('deliveryPersonName').addEventListener('input', validateForm);

    function validateForm() {
      const name = document.getElementById('deliveryPersonName').value.trim();
      const submitBtn = document.getElementById('submitProofBtn');
      submitBtn.disabled = !(name && photoData);
    }

    document.getElementById('submitProofBtn').addEventListener('click', async () => {
      const name = document.getElementById('deliveryPersonName').value.trim();
      
      if (!name || !photoData) {
        alert('Please fill in all fields and take a photo');
        return;
      }

      const submitBtn = document.getElementById('submitProofBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        const response = await fetch(`/delivery/orders/${currentOrderId}/proof`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Basic ' + deliveryCredentials
          },
          body: JSON.stringify({
            deliveryProof: photoData,
            deliveryPerson: name
          })
        });

        if (!response.ok) {
          throw new Error('Failed to submit delivery proof');
        }

        alert('✅ Delivery proof submitted successfully!');
        closeDeliveryModal();
        loadOrders();
      } catch (error) {
        console.error('Error submitting proof:', error);
        alert('Failed to submit delivery proof. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Delivery Proof';
      }
    });

    // Load Past Deliveries (24 hours)
    async function loadPastDeliveries(retryOnAuth = true) {
      try {
        if (!deliveryCredentials) {
          document.getElementById('pastDeliveriesContainer').innerHTML = '<p style="color: #888; text-align: center;">Login required to view past deliveries</p>';
          return;
        }
        
        const response = await fetch('/delivery/past-deliveries', {
          headers: {
            'Authorization': 'Basic ' + deliveryCredentials
          }
        });
        
        if (response.status === 401) {
          deliveryCredentials = null;
          document.getElementById('loginError').textContent = 'Session expired. Please log in again.';
          document.getElementById('loginOverlay').classList.remove('hidden');
          return;
        }
        
        if (!response.ok) throw new Error('Failed to fetch past deliveries');
        
        const data = await response.json();
        const orders = data.orders || [];
        
        const container = document.getElementById('pastDeliveriesContainer');
        
        if (orders.length === 0) {
          container.innerHTML = '<p style="color: #888; text-align: center;">No deliveries completed in the past 24 hours</p>';
          return;
        }
        
        container.innerHTML = orders.map(order => {
          const deliveredDate = new Date(order.delivered_at);
          let items = [];
          try {
            items = Array.isArray(order.items) ? order.items : JSON.parse(order.items || '[]');
          } catch (e) { items = []; }
          
          return `
            <div class="past-delivery-card">
              <div class="past-delivery-info">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                  <span style="color: #017d8e; font-weight: 600; font-family: monospace;">${order.order_number}</span>
                  <span class="delivered-badge">Delivered</span>
                </div>
                <div><strong>${order.customer_name}</strong></div>
                <div style="color: #aaa; font-size: 0.85rem;">${order.customer_address || ''}</div>
                <div style="margin-top: 6px; font-size: 0.85rem; color: #888;">
                  ${items.map(i => `${i.name || 'Item'} × ${i.quantity || 1}`).join(', ')}
                </div>
                <div style="margin-top: 6px; color: #4caf50; font-size: 0.8rem;">
                  ✅ By ${order.delivery_person || 'Unknown'} at ${deliveredDate.toLocaleTimeString('en-CA', { timeZone: 'America/Toronto', hour: '2-digit', minute: '2-digit' })}
                </div>
              </div>
              ${order.delivery_proof ? `
                <img class="past-delivery-proof" src="${order.delivery_proof}" alt="Proof">
              ` : ''}
            </div>
          `;
        }).join('');
        
      } catch (error) {
        console.error('Error loading past deliveries:', error);
        document.getElementById('pastDeliveriesContainer').innerHTML = '<p style="color: #888; text-align: center;">Error loading past deliveries</p>';
      }
    }
    
    loadOrders();
    
    // Load past deliveries after a short delay
    setTimeout(() => {
      loadPastDeliveries();
    }, 1000);
    
    // Auto-refresh every 30 seconds
    setInterval(() => {
      loadOrders();
      loadPastDeliveries();
    }, 30000);
  </script>
</body>
</html>
