<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customise Your Strong Spoon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#009688">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Strong Spoon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cart-nav">
    <a href="cart.html" class="cart-icon">
      🛒 <span class="cart-count">0</span>
    </a>
  </div>

  <section class="order-container">
    <h1 class="order-title">CUSTOMISE YOUR CUP </h1>

    <form id="orderForm" class="order-form" action="/submit-order" method="POST">

      <div class="form-group">
        <label for="flavour" class="section-title">Select Flavour</label>
        <select id="flavour" name="flavour" required>
          <option value="">-- Choose flavour --</option>
          <option value="brownie">Brownie Issues (CHOCOLATE)</option>
          <option value="powerMix">Power Mix (PEANUT BUTTER)</option>
          <option value="goldenScoop">Golden Scoop (VANILLA)</option>
          <option value="spoonCrumble">Spoon Crumble (COOKIE)</option>
        </select>
      </div>

     

      <div class="form-group toppings-section">
        <h2 class="section-title">Toppings (choose one or more)</h2>
        
        <div class="checkbox-group">
          <input type="checkbox" id="almonds" name="toppings" value="almonds">
          <label for="almonds">Almonds</label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="cashews" name="toppings" value="cashews">
          <label for="cashews">Cashews</label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="peanuts" name="toppings" value="peanuts">
          <label for="peanuts">Peanuts</label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="raisins" name="toppings" value="raisins">
          <label for="raisins">Raisins</label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="walnut" name="toppings" value="walnut">
          <label for="walnut">Walnut</label>
        </div>
      </div>

      <div class="form-group fruits-section">
        <h2 class="section-title">Add Fresh Fruits</h2>
        
        <div class="checkbox-group">
          <input type="checkbox" id="apple" name="toppings" value="apple">
          <label for="apple">Apple</label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="blueberries" name="toppings" value="blueberries">
          <label for="blueberries">Blueberries</label>
        </div>
      </div>
      
      

      <div class="form-group">
        <label for="notes">Special Instructions or Allergies</label>
        <textarea id="notes" name="notes" rows="3" placeholder="Optional"></textarea>
      </div>

      <button type="submit" class="btn teal">Add to Cart</button>
    </form>

    <a href="Html2.html" class="back-link">← Back to Flavours</a>

    <footer>
      <a href="https://strongspoon.ca" target="_blank">strongspoon.ca</a>
    </footer>
  </section>

  <script src="products.js"></script>
  <script src="script.js"></script>
  <script src="customise-page.js"></script>
</body>
</html>
