<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customise Your Strong Spoon</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cart-nav">
    <a href="cart.html" class="cart-icon">
      🛒 <span class="cart-count">0</span>
    </a>
  </div>

  <section class="order-container">
    <h1 class="order-title">CUSTOMISE YOUR CUP </h1>

    <form id="orderForm" class="order-form" action="/submit-order" method="POST">

      <div class="form-group">
        <label for="flavour"><h1>Select Flavour *</h1></label>
        <select id="flavour" name="flavour" required>
          <option value="">-- Choose flavour --</option>
          <option value="brownie">Brownie Issues(CHOCOLATE)</option>
          <option value="powerMix">Power MiX(PEANUT BUTTER)</option>
          <option value="comingSoon1" disabled>Coming Soon</option>
          <option value="comingSoon2" disabled>Coming Soon</option>
        </select>
      </div>

     

      <div class="form-group toppings-section">
        <h2 class="section-title">Toppings (choose one or more)</h2>
        
        <div class="checkbox-group">
          <input type="checkbox" id="almonds" name="toppings" value="almonds">
          <label for="almonds"><h3>🌰 Almonds</h3></label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="cashews" name="toppings" value="cashews">
          <label for="cashews"><h3>🥜 Cashews</h3></label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="peanuts" name="toppings" value="peanuts">
          <label for="peanuts"><h3>🥜 Peanuts</h3></label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="raisins" name="toppings" value="raisins">
          <label for="raisins"><h3>�葡 Raisins</h3></label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="dryFruits" name="toppings" value="dryFruits">
          <label for="dryFruits"><h3>🌰 Crushed Dry Fruits</h3></label>
        </div>
      </div>

      <div class="form-group fruits-section">
        <h2 class="section-title">Add Fresh Fruits</h2>
        
        <div class="checkbox-group">
          <input type="checkbox" id="apple" name="toppings" value="apple">
          <label for="apple"><h3>🍎 Apple</h3></label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="blueberries" name="toppings" value="blueberries">
          <label for="blueberries"><h3>🫐 Blueberries</h3></label>
        </div>
      </div>
      
      

      <div class="form-group">
        <label for="notes">Special Instructions or Allergies</label>
        <textarea id="notes" name="notes" rows="3" placeholder="Optional"></textarea>
      </div>

      <div class="form-group">
        
        <label for="email">Your Email *</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        
        <label for="phone"> Your Phone*</label>
        <input type="tel" id="phone" name="phone" placeholder="306-XXX-XXXX" required autocomplete="tel">

        <label for="address">Address with postal code*</label>
        <input type="text" id="address" name="address" placeholder="1234 street, Regina, SK, S4S 0A1" required autocomplete="address">
        
      </div>

      <button type="submit" class="btn teal">Add to Cart</button>
      

    <footer>
      <a href="https://strongspoon.ca" target="_blank">strongspoon.ca</a>
    </footer>
  </section>

  <script src="products.js"></script>
  <script src="script.js"></script>
  <script src="customise-page.js"></script>
</body>
</html>
