<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customise Your Strong Spoon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#009688">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Strong Spoon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cart-nav">
    <a href="cart.html" class="cart-icon">
      🛒 <span class="cart-count">0</span>
    </a>
  </div>

  <section class="customise-page">
    <div class="premium-header">
      <div class="header-decoration"></div>
      <h1 class="premium-title">Customise Your Cup</h1>
      <p class="premium-subtitle">Make it exactly how you like it</p>
      <div class="header-decoration"></div>
    </div>

    <form id="orderForm" class="premium-form" action="/submit-order" method="POST">

      <div class="premium-section">
        <div class="section-header">
          <span class="section-icon">🥄</span>
          <h2>Select Your Flavour</h2>
        </div>
        <select id="flavour" name="flavour" required class="premium-select">
          <option value="">-- Choose flavour --</option>
          <option value="brownie">🍫 Brownie Issues</option>
          <option value="powerMix">🥜 Power Mix</option>
          <option value="goldenScoop">🍦 Golden Scoop</option>
          <option value="spoonCrumble">🍪 Spoon Crumble</option>
        </select>
      </div>

      <div class="premium-section">
        <div class="section-header">
          <span class="section-icon">🥜</span>
          <h2>Add Toppings</h2>
          <span class="free-badge">FREE</span>
        </div>
        <div class="toppings-grid">
          <div class="topping-card">
            <input type="checkbox" id="almonds" name="toppings" value="almonds">
            <label for="almonds">
              <span class="topping-emoji">🌰</span>
              <span class="topping-name">Almonds</span>
            </label>
          </div>
          
          <div class="topping-card">
            <input type="checkbox" id="cashews" name="toppings" value="cashews">
            <label for="cashews">
              <span class="topping-emoji">🥜</span>
              <span class="topping-name">Cashews</span>
            </label>
          </div>
          
          <div class="topping-card">
            <input type="checkbox" id="peanuts" name="toppings" value="peanuts">
            <label for="peanuts">
              <span class="topping-emoji">🥜</span>
              <span class="topping-name">Peanuts</span>
            </label>
          </div>
          
          <div class="topping-card">
            <input type="checkbox" id="raisins" name="toppings" value="raisins">
            <label for="raisins">
              <span class="topping-emoji">🍇</span>
              <span class="topping-name">Raisins</span>
            </label>
          </div>
          
          <div class="topping-card">
            <input type="checkbox" id="walnut" name="toppings" value="walnut">
            <label for="walnut">
              <span class="topping-emoji">🌰</span>
              <span class="topping-name">Walnut</span>
            </label>
          </div>
        </div>
      </div>

      <div class="premium-section">
        <div class="section-header">
          <span class="section-icon">🍎</span>
          <h2>Fresh Fruits</h2>
          <span class="free-badge">FREE</span>
        </div>
        <div class="toppings-grid">
          <div class="topping-card">
            <input type="checkbox" id="apple" name="toppings" value="apple">
            <label for="apple">
              <span class="topping-emoji">🍏</span>
              <span class="topping-name">Apple</span>
            </label>
          </div>
          
          <div class="topping-card">
            <input type="checkbox" id="blueberries" name="toppings" value="blueberries">
            <label for="blueberries">
              <span class="topping-emoji">🫐</span>
              <span class="topping-name">Blueberries</span>
            </label>
          </div>
        </div>
      </div>

      <div class="premium-section">
        <div class="section-header">
          <span class="section-icon">📝</span>
          <h2>Special Notes</h2>
        </div>
        <textarea id="notes" name="notes" rows="3" placeholder="Any allergies or special requests?" class="premium-textarea"></textarea>
      </div>

      <button type="submit" class="btn teal premium-submit">Add to Cart</button>
    </form>

    <a href="Html2.html" class="back-link">← Back to Flavours</a>

    <footer class="premium-footer">
      <a href="https://strongspoon.ca" target="_blank">strongspoon.ca</a>
    </footer>
  </section>

  <div class="cart-popup-overlay" id="cartPopupOverlay">
    <div class="cart-popup">
      <div class="cart-popup-icon">✓</div>
      <h2 class="cart-popup-title">Added to Cart!</h2>
      <div class="cart-popup-details">
        <p class="cart-item-name" id="cartItemName"></p>
        <p class="cart-item-toppings" id="cartItemToppings"></p>
      </div>
      <div class="cart-popup-buttons">
        <button class="cart-popup-btn secondary" id="continueBtn">Continue Shopping</button>
        <a href="cart.html" class="cart-popup-btn primary">View Cart</a>
      </div>
    </div>
  </div>

  <script>
    // Check if website should be in countdown mode
    const launchDate = new Date('2026-04-10T08:00:00-05:00').getTime();
    const now = new Date().getTime();
    
    if (new URLSearchParams(window.location.search).get('preview') === 'strongspoon') {
      localStorage.setItem('ss_preview', 'true');
    }
    
    if (now < launchDate && localStorage.getItem('ss_preview') !== 'true') {
      window.location.href = '/countdown.html';
    }
  </script>

  <script src="products.js"></script>
  <script src="script.js"></script>
  <script src="customise-page.js"></script>
</body>
</html>
