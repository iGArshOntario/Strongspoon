<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Leave a Review — Strong Spoon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#015A64">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #EFE8D8;
      font-family: 'Poppins', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    /* Header */
    .fb-header {
      text-align: center;
      margin-bottom: 28px;
      width: 100%;
    }
    .fb-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #888;
      text-decoration: none;
      font-size: 0.78rem;
      margin-bottom: 18px;
      transition: color 0.2s;
    }
    .fb-back:hover { color: #015A64; }
    .fb-logo {
      font-family: 'Playfair Display', serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #015A64;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .fb-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, #017d8e 50%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s ease-in-out infinite;
      margin-bottom: 6px;
    }
    @keyframes shimmer { 0%,100%{background-position:0% center} 50%{background-position:100% center} }
    .fb-subtitle {
      font-size: 0.82rem;
      color: #777;
      font-weight: 300;
    }

    /* Card */
    .fb-card {
      background: linear-gradient(175deg, #080f11 0%, #030709 100%);
      border: 1px solid rgba(1,90,100,0.35);
      border-radius: 22px;
      padding: 28px 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      position: relative;
      overflow: hidden;
    }
    .fb-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, #015A64 30%, #017d8e 50%, #015A64 70%, transparent 100%);
    }

    /* Star rating */
    .fb-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      display: block;
    }
    .star-row {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      justify-content: center;
    }
    .star {
      font-size: 2.4rem;
      cursor: pointer;
      opacity: 0.25;
      filter: grayscale(1);
      transition: opacity 0.15s, transform 0.15s, filter 0.15s;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      line-height: 1;
    }
    .star.lit {
      opacity: 1;
      filter: none;
      transform: scale(1.12);
    }
    .star.preview {
      opacity: 0.75;
      filter: none;
    }

    /* Fields */
    .fb-field {
      margin-bottom: 14px;
    }
    .fb-input, .fb-select, .fb-textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(1,90,100,0.3);
      border-radius: 12px;
      padding: 12px 15px;
      color: #EFE8D8;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .fb-input:focus, .fb-select:focus, .fb-textarea:focus {
      border-color: rgba(1,125,142,0.6);
      background: rgba(1,90,100,0.08);
    }
    .fb-select {
      appearance: none;
      cursor: pointer;
      color: rgba(239,232,216,0.6);
    }
    .fb-select.chosen { color: #EFE8D8; }
    .fb-select option { background: #0b1416; color: #EFE8D8; }
    .fb-textarea {
      resize: vertical;
      min-height: 90px;
      line-height: 1.5;
    }
    ::placeholder { color: rgba(239,232,216,0.4); }

    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 6px 20px rgba(0,191,165,0.4), 0 2px 8px rgba(0,0,0,0.2); }
      50%       { box-shadow: 0 8px 28px rgba(0,191,165,0.75), 0 2px 8px rgba(0,0,0,0.2), 0 0 36px rgba(0,191,165,0.35); }
    }
    /* Submit */
    .fb-submit {
      width: 100%;
      background: linear-gradient(135deg, #017d8e, #015A64);
      border: none;
      border-radius: 14px;
      padding: 15px;
      color: #EFE8D8;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.22s, box-shadow 0.22s;
      margin-top: 6px;
      animation: btnGlow 2.5s ease-in-out infinite;
    }
    .fb-submit:not(:disabled):hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 30px rgba(0,191,165,0.65), 0 0 40px rgba(0,191,165,0.3); animation: none; }
    .fb-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; animation: none; box-shadow: none; }

    /* Success */
    .fb-success {
      display: none;
      text-align: center;
      padding: 20px;
    }
    .fb-success-icon { font-size: 3rem; margin-bottom: 12px; }
    .fb-success h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #EFE8D8;
      margin-bottom: 8px;
    }
    .fb-success p { font-size: 0.82rem; color: #777; line-height: 1.6; }
    .fb-success a {
      display: inline-block;
      margin-top: 18px;
      color: #017d8e;
      text-decoration: none;
      font-size: 0.82rem;
      border-bottom: 1px solid rgba(1,125,142,0.3);
      padding-bottom: 2px;
    }

    /* Rating hint */
    .rating-hint {
      text-align: center;
      font-size: 0.72rem;
      color: #555;
      margin-bottom: 20px;
      min-height: 16px;
      transition: color 0.2s;
    }

    @media (max-width: 480px) {
      body { padding: 16px 12px 32px; }
      .fb-title { font-size: 1.65rem; }
      .fb-card { padding: 22px 18px; }
    }
  </style>
</head>
<body>

  <div class="fb-header">
    <a href="index.html" class="fb-back">← Back to Strong Spoon</a>
    <div class="fb-logo">Strong Spoon</div>
    <h1 class="fb-title">Leave a Review</h1>
    <p class="fb-subtitle">Your feedback helps us grow stronger</p>
  </div>

  <div class="fb-card" id="fbCard">

    <!-- Success state (hidden by default) -->
    <div class="fb-success" id="fbSuccess">
      <div class="fb-success-icon">🙏</div>
      <h2>Thank You!</h2>
      <p>Your review has been received.<br>We really appreciate you taking the time.</p>
      <a href="Html2.html">← Browse Flavours</a>
    </div>

    <!-- Form -->
    <form id="fbForm">

      <label class="fb-label" style="display:block; text-align:center; margin-bottom:12px;">How was your experience?</label>

      <div class="star-row" id="starRow">
        <span class="star" data-val="1">⭐</span>
        <span class="star" data-val="2">⭐</span>
        <span class="star" data-val="3">⭐</span>
        <span class="star" data-val="4">⭐</span>
        <span class="star" data-val="5">⭐</span>
      </div>

      <p class="rating-hint" id="ratingHint">Tap a star to rate</p>

      <div class="fb-field">
        <input class="fb-input" type="text" id="fbName" placeholder="Your name (optional)" maxlength="100">
      </div>

      <div class="fb-field">
        <select class="fb-select" id="fbFlavor">
          <option value="">Which flavour? (optional)</option>
          <option value="Brownie Issues">🍫 Brownie Issues</option>
          <option value="Power Mix">🥜 Power Mix</option>
          <option value="Golden Scoop">🍦 Golden Scoop</option>
          <option value="Spoon Crumble">🍪 Spoon Crumble</option>
        </select>
      </div>

      <div class="fb-field">
        <textarea class="fb-textarea" id="fbComment" placeholder="Tell us about your experience…" maxlength="500"></textarea>
      </div>

      <button type="submit" class="fb-submit" id="fbSubmit" disabled>Submit Review</button>

    </form>
  </div>

  <script>
    const hints = ['', '😞 That\'s tough to hear', '😕 We\'ll do better', '😊 Glad you liked it', '😄 That\'s great!', '🤩 Amazing — thank you!'];
    const stars = Array.from(document.querySelectorAll('.star'));
    const submitBtn = document.getElementById('fbSubmit');
    const ratingHint = document.getElementById('ratingHint');
    const flavorSelect = document.getElementById('fbFlavor');
    let selectedRating = 0;

    function paintStars(upTo) {
      stars.forEach(s => {
        const v = parseInt(s.dataset.val);
        if (v <= upTo) {
          s.classList.add('lit');
          s.classList.remove('preview');
        } else {
          s.classList.remove('lit', 'preview');
        }
      });
    }

    // Mouse hover (desktop)
    stars.forEach(s => {
      s.addEventListener('mouseenter', () => {
        if (selectedRating === 0) {
          const v = parseInt(s.dataset.val);
          stars.forEach(st => {
            const sv = parseInt(st.dataset.val);
            st.classList.toggle('preview', sv <= v);
            st.classList.remove('lit');
          });
        }
      });
      s.addEventListener('mouseleave', () => {
        if (selectedRating === 0) {
          stars.forEach(st => st.classList.remove('preview'));
        }
      });
    });

    // Click / tap — works on both mobile and desktop
    stars.forEach(s => {
      s.addEventListener('click', (e) => {
        e.preventDefault();
        const val = parseInt(s.dataset.val);
        // Allow tapping same star to deselect
        if (selectedRating === val) {
          selectedRating = 0;
          paintStars(0);
          submitBtn.disabled = true;
          ratingHint.textContent = 'Tap a star to rate';
          ratingHint.style.color = '#555';
        } else {
          selectedRating = val;
          paintStars(val);
          submitBtn.disabled = false;
          ratingHint.textContent = hints[val];
          ratingHint.style.color = val >= 4 ? '#5ec463' : val === 3 ? '#ffc107' : '#f55';
        }
      });
    });

    // Flavor select: brighten text once a real choice is made
    flavorSelect.addEventListener('change', () => {
      flavorSelect.classList.toggle('chosen', flavorSelect.value !== '');
    });

    // Form submit
    document.getElementById('fbForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedRating) {
        ratingHint.textContent = 'Please pick a star rating first';
        ratingHint.style.color = '#f55';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      const body = {
        rating: selectedRating,
        name: document.getElementById('fbName').value.trim() || null,
        flavor: flavorSelect.value || null,
        comment: document.getElementById('fbComment').value.trim() || null
      };

      try {
        const res = await fetch('/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error('Server error');
        document.getElementById('fbForm').style.display = 'none';
        document.getElementById('fbSuccess').style.display = 'block';
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Review';
        alert('Something went wrong. Please try again.');
      }
    });
  </script>
</body>
</html>
